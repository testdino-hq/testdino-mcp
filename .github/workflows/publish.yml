name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  quality:
    name: Pre-publish Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  version-check:
    name: Validate Release Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(jq -r '.version' package.json)
          SRV_VERSION=$(jq -r '.version' server.json)
          IDX_VERSION=$(grep 'version:' src/index.ts | head -1 | sed 's/.*"\([^"]*\)".*/\1/')

          echo "Git tag:      $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          echo "server.json:  $SRV_VERSION"
          echo "src/index.ts: $IDX_VERSION"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$SRV_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match server.json ($SRV_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$IDX_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match src/index.ts ($IDX_VERSION)"
            exit 1
          fi

          echo "All versions match tag: $TAG_VERSION"

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [quality, version-check]
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
