name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --passWithNoTests

      - name: Build
        run: npm run build

  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check version sync across files
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          SRV_VERSION=$(jq -r '.version' server.json)
          SRV_PKG_VERSION=$(jq -r '.packages[0].version' server.json)
          IDX_VERSION=$(grep 'version:' src/index.ts | head -1 | sed 's/.*"\([^"]*\)".*/\1/')

          echo "package.json:          $PKG_VERSION"
          echo "server.json:           $SRV_VERSION"
          echo "server.json packages:  $SRV_PKG_VERSION"
          echo "src/index.ts:          $IDX_VERSION"

          FAILED=0
          if [ "$PKG_VERSION" != "$SRV_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != server.json ($SRV_VERSION)"
            FAILED=1
          fi
          if [ "$PKG_VERSION" != "$SRV_PKG_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != server.json packages ($SRV_PKG_VERSION)"
            FAILED=1
          fi
          if [ "$PKG_VERSION" != "$IDX_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != src/index.ts ($IDX_VERSION)"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Version must be consistent across package.json, server.json, and src/index.ts"
            exit 1
          fi

          echo "All versions consistent: $PKG_VERSION"
